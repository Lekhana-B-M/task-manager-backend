spring.application.name=my-first-api

# If Render provides SPRING_DATASOURCE_URL, it uses it. 
# Otherwise, it looks for the local postgres (helps you run in Eclipse).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Force Hibernate to know it is PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Port handling
server.port=${PORT:8080}

# JWT
app.jwt.secret=${APP_JWT_SECRET:my-very-long-secret-key-at-least-32-characters-long}